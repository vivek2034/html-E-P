  <script>
    // ==========================================
    // Configuration & State Management
    // ==========================================
    
    const defaultConfig = {
      app_title: 'HTML Editor Pro',
      default_html: `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Project</title>
  <style>
    /* Your CSS here */
  </style>
</head>
<body>
  <h1>Hello, World!</h1>
  <p>Start editing to see your changes live!</p>
  
  <script>
    // Your JavaScript here
    console.log('Page loaded!');
  <\/script>
</body>
</html>`,
      primary_color: '#3b82f6',
      secondary_color: '#1e1e2e',
      text_color: '#f8f8f2',
      accent_color: '#8b5cf6',
      background_color: '#0f172a'
    };
    
    let config = { ...defaultConfig };
    
    // State
    let editors = {};
    let activeTab = 'html';
    let wordWrap = false;
    let autoSaveTimeout = null;
    let isOffline = !navigator.onLine;
    
    // Default code templates
    const defaultCode = {
      html: defaultConfig.default_html,
      css: `/* Custom Styles */
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  margin: 0;
  padding: 2rem;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  color: #fff;
}

h1 {
  font-size: 3rem;
  margin-bottom: 1rem;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

p {
  font-size: 1.25rem;
  opacity: 0.9;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}`,
      js: `// JavaScript Code
document.addEventListener('DOMContentLoaded', () => {
  console.log('Document ready!');
  
  // Add your interactive code here
  const h1 = document.querySelector('h1');
  if (h1) {
    h1.style.cursor = 'pointer';
    h1.addEventListener('click', () => {
      h1.style.color = h1.style.color === 'gold' ? '#fff' : 'gold';
    });
  }
});`
    };
    
    // ==========================================
    // LocalStorage Management
    // ==========================================
    
    const STORAGE_KEY = 'html-editor-pro-project';
    
    function saveToLocalStorage() {
      const project = {
        html: editors.html?.getValue() || defaultCode.html,
        css: editors.css?.getValue() || defaultCode.css,
        js: editors.js?.getValue() || defaultCode.js,
        timestamp: Date.now()
      };
      
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(project));
        showStatus('Auto-saved', 'success');
      } catch (e) {
        showStatus('Save failed', 'error');
        console.error('Failed to save:', e);
      }
    }
    
    function loadFromLocalStorage() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const project = JSON.parse(saved);
          return {
            html: project.html || defaultCode.html,
            css: project.css || defaultCode.css,
            js: project.js || defaultCode.js
          };
        }
      } catch (e) {
        console.error('Failed to load:', e);
      }
      return { ...defaultCode };
    }
    
    function autoSave() {
      clearTimeout(autoSaveTimeout);
      autoSaveTimeout = setTimeout(saveToLocalStorage, 1000);
      showStatus('Saving...', 'pending');
    }
    
    // ==========================================
    // Editor Initialization
    // ==========================================
    
    function initEditors() {
      const savedCode = loadFromLocalStorage();
      
      const commonConfig = {
        theme: 'dracula',
        lineNumbers: true,
        lineWrapping: wordWrap,
        autoCloseTags: true,
        autoCloseBrackets: true,
        matchBrackets: true,
        indentUnit: 2,
        tabSize: 2,
        indentWithTabs: false,
        foldGutter: true,
        gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
        extraKeys: {
          'Ctrl-S': () => saveToLocalStorage(),
          'Cmd-S': () => saveToLocalStorage(),
          'Ctrl-/': 'toggleComment',
          'Cmd-/': 'toggleComment'
        }
      };
      
      // HTML Editor
      editors.html = CodeMirror(document.getElementById('html-editor'), {
        ...commonConfig,
        mode: 'htmlmixed',
        value: savedCode.html
      });
      
      // CSS Editor
      editors.css = CodeMirror(document.getElementById('css-editor'), {
        ...commonConfig,
        mode: 'css',
        value: savedCode.css
      });
      
      // JS Editor
      editors.js = CodeMirror(document.getElementById('js-editor'), {
        ...commonConfig,
        mode: 'javascript',
        value: savedCode.js
      });
      
      // Add change listeners
      Object.values(editors).forEach(editor => {
        editor.on('change', () => {
          autoSave();
          updatePreview();
        });
        
        editor.on('cursorActivity', () => {
          updateCursorPosition(editor);
        });
      });
      
      // Initial preview
      updatePreview();
      updateCursorPosition(editors.html);
    }
    
    // ==========================================
    // Tab Management
    // ==========================================
    
    function switchTab(tab) {
      activeTab = tab;
      
      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const isActive = btn.dataset.tab === tab;
        btn.className = `tab-btn ${isActive ? 'tab-active' : 'tab-inactive'} px-4 py-2.5 text-sm font-medium flex items-center gap-2`;
      });
      
      // Show/hide editors
      ['html', 'css', 'js'].forEach(t => {
        const el = document.getElementById(`${t}-editor`);
        el.classList.toggle('hidden', t !== tab);
      });
      
      // Refresh editor and update status
      if (editors[tab]) {
        editors[tab].refresh();
        updateCursorPosition(editors[tab]);
      }
      
      // Update mode display
      const modes = { html: 'HTML', css: 'CSS', js: 'JavaScript' };
      document.getElementById('mode-display').textContent = modes[tab];
    }
    
    // ==========================================
    // Preview Management
    // ==========================================
    
    function updatePreview() {
      const iframe = document.getElementById('preview-frame');
      const html = editors.html?.getValue() || '';
      const css = editors.css?.getValue() || '';
      const js = editors.js?.getValue() || '';
      
      // Combine code
      let combined = html;
      
      // Inject external CSS if not already in HTML
      if (css && !html.includes('<link rel="stylesheet"')) {
        const styleTag = `<style>\n${css}\n</style>`;
        if (combined.includes('</head>')) {
          combined = combined.replace('</head>', `${styleTag}\n</head>`);
        } else if (combined.includes('<body>')) {
          combined = combined.replace('<body>', `<head>${styleTag}</head>\n<body>`);
        } else {
          combined = `<head>${styleTag}</head>\n${combined}`;
        }
      }
      
      // Inject external JS if not already in HTML
      if (js && !html.includes('<script src=')) {
        const scriptTag = `<script>\n${js}\n<\/script>`;
        if (combined.includes('</body>')) {
          combined = combined.replace('</body>', `${scriptTag}\n</body>`);
        } else {
          combined += `\n${scriptTag}`;
        }
      }
      
      // Update iframe
      iframe.srcdoc = combined;

        info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'

    // ==========================================
    // Download Functionality
    // ==========================================
    
    async function downloadProject() {
      const zip = new JSZip();
      
      const html = editors.html?.getValue() || '';
      const css = editors.css?.getValue() || '';
      const js = editors.js?.getValue() || '';
      
      // Create index.html with proper links
      let indexHtml = html;
      
      // Add CSS link if external CSS exists
      if (css) {
        const cssLink = '<link rel="stylesheet" href="styles.css">';
        if (indexHtml.includes('</head>')) {
          indexHtml = indexHtml.replace('</head>', `  ${cssLink}\n</head>`);
        }
      }
      
      // Add JS link if external JS exists
      if (js) {
        const jsLink = '<script src="script.js"><\/script>';
        if (indexHtml.includes('</body>')) {
          indexHtml = indexHtml.replace('</body>', `  ${jsLink}\n</body>`);
        }
      }
      
      // Add files to zip
      zip.file('index.html', indexHtml);
      if (css) zip.file('styles.css', css);
      if (js) zip.file('script.js', js);
      
      // Add readme
      zip.file('README.md', `# My Web Project

Created with HTML Editor Pro

## Files
- \`index.html\` - Main HTML file
${css ? '- `styles.css` - Stylesheet\n' : ''}${js ? '- `script.js` - JavaScript\n' : ''}

## Usage
Open \`index.html\` in your browser to view the project.
`);
      
      // Generate and download
      try {
        const content = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'my-project.zip';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('Project downloaded successfully!', 'success');
      } catch (e) {
        showToast('Download failed', 'error');
        console.error('Download error:', e);
      }
    }
    
    // ==========================================
    // Split Panel Resizer
    // ==========================================
    
    function initResizer() {
      const resizer = document.getElementById('resizer');
      const editorPanel = document.getElementById('editor-panel');
      const previewPanel = document.getElementById('preview-panel');
      let isResizing = false;
      
      resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        
        const containerWidth = editorPanel.parentElement.offsetWidth;
        const newWidth = (e.clientX / containerWidth) * 100;
        
        if (newWidth > 20 && newWidth < 80) {
          editorPanel.style.width = `${newWidth}%`;
          previewPanel.style.width = `${100 - newWidth - 0.25}%`;
          
          // Refresh editors
          Object.values(editors).forEach(editor => editor.refresh());
        }
      });
      
      document.addEventListener('mouseup', () => {
        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    }
    
    // ==========================================
    // Event Listeners
    // ==========================================
    
    function initEventListeners() {
      // Tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
      
      // New button
      document.getElementById('new-btn').addEventListener('click', () => {
        if (confirm('Start a new project? Unsaved changes will be lost.') === false) {
          // Use inline confirmation instead
        }
        Object.keys(editors).forEach(key => {
          editors[key].setValue(defaultCode[key]);
        });
        saveToLocalStorage();
        showToast('New project created', 'success');
      });
      
      // Download button
      document.getElementById('download-btn').addEventListener('click', downloadProject);
      
      // Refresh preview
      document.getElementById('refresh-btn').addEventListener('click', updatePreview);
      
      // Word wrap toggle
      document.getElementById('wrap-btn').addEventListener('click', () => {
        wordWrap = !wordWrap;
        Object.values(editors).forEach(editor => {
          editor.setOption('lineWrapping', wordWrap);
        });
        showToast(`Word wrap ${wordWrap ? 'enabled' : 'disabled'}`, 'info');
      });
      
      // Format button (basic indentation)
      document.getElementById('format-btn').addEventListener('click', () => {
        const editor = editors[activeTab];
        if (editor) {
          const cursor = editor.getCursor();
          editor.execCommand('selectAll');
          editor.execCommand('indentAuto');
          editor.setCursor(cursor);
          showToast('Code formatted', 'success');
        }
      });
      
      // Fullscreen preview
      document.getElementById('fullscreen-btn').addEventListener('click', () => {
        const iframe = document.getElementById('preview-frame');
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen();
        }
      });
      
      // Online/offline detection
      window.addEventListener('online', () => {
        isOffline = false;
        document.getElementById('offline-banner').classList.add('hidden');
        showToast('You\'re back online!', 'success');
      });
      
      window.addEventListener('offline', () => {
        isOffline = true;
        document.getElementById('offline-banner').classList.remove('hidden');
        showToast('You\'re offline. Changes are saved locally.', 'info');
      });
      
      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        // Ctrl/Cmd + 1/2/3 for tabs
        if ((e.ctrlKey || e.metaKey) && ['1', '2', '3'].includes(e.key)) {
          e.preventDefault();
          const tabs = ['html', 'css', 'js'];
          switchTab(tabs[parseInt(e.key) - 1]);
        }
      });
    }

    function mapToCapabilities(cfg) {

            }
          },
          {

    function mapToEditPanelValues(cfg) {

    async function init() {

      if (window.elementSdk) {
        window.elementSdk.init({

          onConfigChange,
          mapToCapabilities,
          mapToEditPanelValues
        });
        config = window.elementSdk.config || defaultConfig;
      }
      
      // Check offline status
      if (!navigator.onLine) {
        isOffline = true;
        document.getElementById('offline-banner').classList.remove('hidden');
      }
      
      // Initialize components
      initEditors();
      initResizer();
      initEventListeners();
      
      // Initial config apply
      onConfigChange(config);
      
      showToast('Editor ready!', 'success');
